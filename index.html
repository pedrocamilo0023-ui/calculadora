<title>Calculadora</title>

<body>

<button class="tema-toggle" onclick="alternarTema()">🌙</button>

<div class="layout">

<div class="card">

<header>
<h1>Calculadora</h1>
</header>

<main class="container">

<input type="text" id="visor" placeholder="Digite ou use os botões">

<div class="botoes">

<button onclick="adicionar('+')" class="button">+</button>
<button onclick="adicionar('-')" class="button">−</button>
<button onclick="adicionar('*')" class="button">×</button>
<button onclick="adicionar('/')" class="button">÷</button>

<button onclick="potencia()" class="button-avancado-op">x²</button>
<button onclick="raiz()" class="button-avancado-op">√</button>
<button onclick="porcentagem()" class="button-avancado-op">%</button>

<button onclick="apagarChar()" class="button-clear">⌫</button>

</div>

<div class="cientifico">

<button onclick="adicionar('Math.sin(')">sin</button>
<button onclick="adicionar('Math.cos(')">cos</button>
<button onclick="adicionar('Math.tan(')">tan</button>
<button onclick="adicionar('Math.log10(')">log</button>
<button onclick="adicionar('Math.PI')">π</button>

</div>

<div class="gatinho-box">
<img id="gatinho" src="" alt="gatinho fofo">
</div>

</main>

</div>

<section class="historico-card">

<h2>Histórico</h2>

<div id="historico"></div>

<div class="historico-botoes">

<button onclick="apagarUltimo()" class="button-historico">↩</button>
<button onclick="limparHistorico()" class="button-historico">Limpar</button>

</div>

</section>


<section class="notas-card">

<h2>Notas</h2>

<textarea id="blocoNotas" placeholder="Digite suas notas..."></textarea>

</section>

</div>
